<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Input Methods</title>
</head>
<body>
  <h2>Input Demonstration</h2>

  <!-- Form Input -->
  <input type="text" id="formInput" placeholder="INPUT something">
  <button onclick="formInput()">Submit</button>
  <p id="formOutput"></p>

  <script>
    // Prompt Input
    let promptValue = prompt("Enter a value:");
    document.write("You entered: " + promptValue);

    // Form Input
    function formInput() {
      let value = document.getElementById("formInput").value;
      document.getElementById("formOutput").innerHTML = "Form input: " + value;
    }
  </script>
</body>
</html>
