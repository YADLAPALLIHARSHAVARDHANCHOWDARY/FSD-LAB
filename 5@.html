<!DOCTYPE html>
<html>
<head>
<style>
.named{color: orange;}        
.hex{color:#FFFFFF;}          
.rgb{color:rgb(0,128,0);}     
.rgba{color:rgba(255,255,0,1);} 
.hsl{color:hsl(0,100%,50%);}  
.hsla{color:hsla(240,100%,50%,1);} 
</style>
</head>

<body>

<p class="named">This is named color.</p>
<p class="hex">This is hex color.</p>
<p class="rgb">This is rgb color.</p>
<p class="rgba">This is rgba color.</p>
<p class="hsl">This is hsl color.</p>
<p class="hsla">This is hsla color.</p>

</body>
</html>
