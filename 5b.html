<!DOCTYPE html>
<html>
<head>
 <title>Fixed Tilted background</title>
<style>
 body{
      margin:0;
      height:200vh;
     }
 body::before{
     content:" ";
     position:fixed;
     top:50%;
     left:50%;
     width:500px;
     height:300px;
     background-image:url(https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/TATA_Safari_Dicor_2.2.jpg/500px-TATA_Safari_Dicor_2.2.jpg);
     background-size:cover;
     background-repeat:no-repeat;
     transform:translate(-50%,-50%) rotate(15deg);
     z-index:-1;
 }
p{
  padding:20px;
}
</style>
</head>
<body>
    <h2>Scrolling page</h2>
    <p>Scroll down to see that image stays fixed in position </p>
</body>

</html>
